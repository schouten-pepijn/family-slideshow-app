services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: slideshow
      POSTGRES_USER: slideshow
      POSTGRES_PASSWORD: slideshow
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_DEV_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slideshow -d slideshow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: >
      sh -c "uv run python -m alembic upgrade head &&
      uv run python -m fastapi dev src/main.py --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://slideshow:slideshow@postgres:5432/slideshow
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your shell or .env}
      SESSION_COOKIE_NAME: session
      SESSION_COOKIE_SAMESITE: lax
      SESSION_MAX_AGE: 2592000
      UPLOADS_DIR: /data/uploads
      ALLOWED_ORIGINS: '["http://localhost:${FRONTEND_DEV_PORT:-5173}"]'
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in your shell or .env}
      VIEWER_USERNAME: ${VIEWER_USERNAME:-viewer}
      VIEWER_PASSWORD: ${VIEWER_PASSWORD:?Set VIEWER_PASSWORD in your shell or .env}
    volumes:
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/src:/app/src
      - backend-data:/data
    ports:
      - "${BACKEND_DEV_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ""
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
      - ./frontend/src:/app/src
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"

volumes:
  backend-data:
