version: '3'

tasks:
  backend:install:
    dir: backend
    env:
      UV_CACHE_DIR: '{{.TASKFILE_DIR}}/backend/.uv-cache'
    cmds:
      - uv sync

  backend:dev:
    dir: backend
    env:
      PYTHONUTF8: '1'
      UV_CACHE_DIR: '{{.TASKFILE_DIR}}/backend/.uv-cache'
    cmds:
      - uv run python -m fastapi dev src/main.py --reload

  backend:migrate:
    dir: backend
    env:
      UV_CACHE_DIR: '{{.TASKFILE_DIR}}/backend/.uv-cache'
    cmds:
      - uv run python -m alembic upgrade head

  frontend:install:
    dir: frontend
    cmds:
      - npm install

  frontend:dev:
    dir: frontend
    cmds:
      - npm run dev

  frontend:typecheck:
    dir: frontend
    cmds:
      - npm run typecheck

  frontend:build:
    dir: frontend
    cmds:
      - npm run build

  docker:build:
    desc: Build the Docker images.
    cmds:
      - docker compose build

  docker:init:
    desc: Build and start the full app in Docker.
    cmds:
      - docker compose up --build -d

  docker:up:
    desc: Build and start the full app in Docker, attached to logs.
    cmds:
      - docker compose up --build

  docker:down:
    desc: Stop the Docker app.
    cmds:
      - docker compose down

  docker:destroy:
    desc: Stop Docker app and remove persisted data.
    cmds:
      - docker compose down --volumes

  docker:logs:
    desc: Follow Docker app logs.
    cmds:
      - docker compose logs -f
