version: '3'

tasks:
  backend:install:
    dir: backend
    env:
      UV_CACHE_DIR: '{{.TASKFILE_DIR}}/backend/.uv-cache'
    cmds:
      - uv sync

  backend:dev:
    dir: backend
    env:
      PYTHONUTF8: '1'
      UV_CACHE_DIR: '{{.TASKFILE_DIR}}/backend/.uv-cache'
    cmds:
      - uv run python -m fastapi dev src/main.py --reload

  backend:migrate:
    dir: backend
    env:
      UV_CACHE_DIR: '{{.TASKFILE_DIR}}/backend/.uv-cache'
    cmds:
      - uv run python -m alembic upgrade head

  frontend:install:
    dir: frontend
    cmds:
      - npm install

  frontend:dev:
    dir: frontend
    cmds:
      - npm run dev

  frontend:typecheck:
    dir: frontend
    cmds:
      - npm run typecheck

  frontend:build:
    dir: frontend
    cmds:
      - npm run build

  docker:build:
    cmds:
      - docker compose build

  docker:up:
    cmds:
      - docker compose up --build

  docker:down:
    cmds:
      - docker compose down
