services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: slideshow
      POSTGRES_USER: slideshow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slideshow -d slideshow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://slideshow:${POSTGRES_PASSWORD}@postgres:5432/slideshow
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your shell or .env}
      SESSION_COOKIE_NAME: session
      SESSION_COOKIE_SAMESITE: lax
      SESSION_MAX_AGE: 2592000
      UPLOADS_DIR: /data/uploads
      IMAGE_URL_TOKEN_TTL_SECONDS: ${IMAGE_URL_TOKEN_TTL_SECONDS:-86400}
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-["http://localhost:8080"]}'
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in your shell or .env}
      VIEWER_USERNAME: ${VIEWER_USERNAME:-viewer}
      VIEWER_PASSWORD: ${VIEWER_PASSWORD:?Set VIEWER_PASSWORD in your shell or .env}
    volumes:
      - uploads-data:/data/uploads
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres-data:
  uploads-data:
